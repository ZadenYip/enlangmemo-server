<div class="signup-page">
  <div class="signup-form">
    <h1>注册账号</h1>

    <form [formGroup]="signUpForm">
      <mat-form-field appearance="outline">
        <mat-label>登录 ID</mat-label>
        <input matInput type="text" name="loginId" autocomplete="username" formControlName="loginId">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>昵称</mat-label>
        <input matInput type="text" name="nickname" autocomplete="nickname" formControlName="nickname">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>密码</mat-label>
        <input matInput type="password" name="password" autocomplete="new-password" formControlName="password">
      </mat-form-field>

      <button matButton="filled" type="submit" [disabled]="!signUpForm.valid">注册</button>
    </form>
  </div>
</div>
